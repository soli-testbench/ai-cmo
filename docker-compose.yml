version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cmo
      POSTGRES_PASSWORD: cmo
      POSTGRES_DB: ai_cmo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cmo -d ai_cmo"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
